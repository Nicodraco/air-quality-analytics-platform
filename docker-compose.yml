services:
  minio:
    image: minio/minio:latest
    container_name: ambiental-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: ambiental-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ambiental_dw
      POSTGRES_USER: ambiental
      POSTGRES_PASSWORD: ambiental123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/gold/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ambiental -d ambiental_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
  postgres_data:
